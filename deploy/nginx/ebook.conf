# nginx do host (VPS). TLS via Cloudflare proxy + origin cert, ou certbot.
server {
    listen 80;
    server_name app.SEU-DOMINIO;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m; # upload de PDFs pelo painel
    }
}

server {
    listen 80;
    server_name lp.SEU-DOMINIO;

    # Landing pages estáticas publicadas pelo LP Generator (Fase 2)
    root /opt/ebook/data/artifacts/lp;
    index index.html;

    location / {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=300";
    }

    # pixel e webhooks passam pela API
    location /px.gif {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
