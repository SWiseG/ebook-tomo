# nginx do host (VPS) — proxy único para o container da API (:8080).
# A própria API serve tudo: SPA, /api/*, /lp/{slug}, /media/{**}, /go/{slug}, /px.gif e /webhooks/*.
# TLS: o jeito mais simples é Cloudflare proxy (nuvem laranja) em modo "Full" com um
#   Origin Certificate da Cloudflare instalado abaixo (bloco 443). Alternativa: certbot.

server {
    listen 80;
    server_name app.SEU-DOMINIO;

    # Cloudflare proxy já faz HTTP->HTTPS na borda; mantemos :80 na origem.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;          # jobs/Playwright podem demorar
        client_max_body_size 50m;
    }
}

