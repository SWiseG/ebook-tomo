<ng-container *transloco="let t">
  <div class="page-head anim-in">
    <div>
      <h1>{{ t('jobs.title') }}</h1>
      <div class="sub">{{ t('jobs.subtitle') }}</div>
    </div>
  </div>

  <div class="grid-toolbar anim-in">
    <p-selectButton
      [options]="statusOptions()"
      [(ngModel)]="status"
      optionLabel="label"
      optionValue="value"
      [allowEmpty]="false"
      (onChange)="load()"
    />
    <label class="grid-search">
      <i class="pi pi-search"></i>
      <input type="search" [(ngModel)]="quickFilter" (ngModelChange)="onSearch()" [placeholder]="t('common.search')" />
    </label>
  </div>

  @if (page(); as p) {
    @if (p.items.length === 0) {
      <div class="empty anim-in">{{ t('jobs.empty') }}</div>
    } @else {
      <ag-grid-angular
        class="tomo-grid-fill anim-in"
        [rowData]="p.items"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="theme"
        [gridOptions]="gridOptions"
        [pagination]="true"
        [paginationAutoPageSize]="true"
        (gridReady)="onGridReady($event)"
      />
    }
  } @else {
    <app-loading variant="table" [rows]="8" />
  }
</ng-container>
