<ng-container *transloco="let t">
  <div class="page-head anim-in">
    <div>
      <h1>{{ t('jobs.title') }}</h1>
      <div class="sub">{{ t('jobs.subtitle') }}</div>
    </div>
  </div>

  <p-selectButton
    class="filter"
    [options]="statusOptions()"
    [(ngModel)]="status"
    optionLabel="label"
    optionValue="value"
    [allowEmpty]="false"
    (onChange)="load()"
  />

  @if (page(); as p) {
    <p class="muted count">{{ t('jobs.count', { count: p.total }) }}</p>
    @if (p.items.length === 0) {
      <div class="empty anim-in">{{ t('jobs.empty') }}</div>
    } @else {
      <ag-grid-angular
        class="anim-in"
        [rowData]="p.items"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="theme"
        [gridOptions]="gridOptions"
        domLayout="autoHeight"
        [pagination]="p.items.length > 15"
        [paginationPageSize]="15"
        [paginationPageSizeSelector]="false"
        [suppressPaginationPanel]="p.items.length <= 15"
        (gridReady)="onGridReady($event)"
        style="width:100%"
      />
    }
  } @else {
    <app-loading variant="table" [rows]="8" />
  }
</ng-container>
