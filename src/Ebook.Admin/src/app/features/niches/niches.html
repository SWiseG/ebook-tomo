<ng-container *transloco="let t">
  <div class="page-head anim-in">
    <div>
      <h1>{{ t('niches.title') }}</h1>
      <div class="sub">{{ t('niches.subtitle') }}</div>
    </div>
    <div class="actions">
      <p-button [label]="t('niches.discover')" icon="pi pi-compass" (onClick)="discover()" />
    </div>
  </div>

  <p-selectButton
    class="filter"
    [options]="statusOptions()"
    [(ngModel)]="status"
    optionLabel="label"
    optionValue="value"
    [allowEmpty]="false"
    (onChange)="load()"
  />

  @if (niches(); as list) {
    @if (list.length === 0) {
      <div class="empty anim-in">{{ t('niches.empty') }}</div>
    } @else {
      <ag-grid-angular
        class="anim-in"
        [rowData]="list"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="theme"
        [gridOptions]="gridOptions"
        domLayout="autoHeight"
        [pagination]="list.length > 12"
        [paginationPageSize]="12"
        [paginationPageSizeSelector]="false"
        [suppressPaginationPanel]="list.length <= 12"
        (gridReady)="onGridReady($event)"
        style="width:100%"
      />
    }
  } @else {
    <app-loading variant="table" [rows]="6" />
  }
</ng-container>
