<ng-container *transloco="let t">
  <div class="page-head anim-in">
    <div>
      <h1>{{ t('niches.title') }}</h1>
      <div class="sub">{{ t('niches.subtitle') }}</div>
    </div>
    <div class="actions">
      <p-button [label]="t('niches.discover')" icon="pi pi-compass" (onClick)="discover()" />
    </div>
  </div>

  <div class="grid-toolbar anim-in">
    <p-selectButton
      [options]="statusOptions()"
      [(ngModel)]="status"
      optionLabel="label"
      optionValue="value"
      [allowEmpty]="false"
      (onChange)="load()"
    />
    <label class="grid-search">
      <i class="pi pi-search"></i>
      <input type="search" [(ngModel)]="quickFilter" (ngModelChange)="onSearch()" [placeholder]="t('common.search')" />
    </label>
  </div>

  @if (niches(); as list) {
    @if (list.length === 0) {
      <div class="empty anim-in">{{ t('niches.empty') }}</div>
    } @else {
      <ag-grid-angular
        class="tomo-grid-fill anim-in"
        [rowData]="list"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="theme"
        [gridOptions]="gridOptions"
        [pagination]="true"
        [paginationAutoPageSize]="true"
        (gridReady)="onGridReady($event)"
      />
    }
  } @else {
    <app-loading variant="table" [rows]="6" />
  }
</ng-container>
