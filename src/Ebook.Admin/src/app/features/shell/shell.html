<div class="shell">
  <aside class="sidebar">
    <h2 class="brand">EBOOK<span>.admin</span></h2>
    <nav>
      @for (item of menu; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
      }
    </nav>
    <button class="logout" (click)="auth.logout()">Sair</button>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
