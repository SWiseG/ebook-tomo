<ng-container *transloco="let t">
  <div class="page-head anim-in">
    <div>
      <h1>{{ t('channels.title') }}</h1>
      <div class="sub">{{ t('channels.subtitle') }}</div>
    </div>
    <div class="actions">
      <p-button
        [label]="t('channels.new')"
        icon="pi pi-plus"
        [disabled]="availableNiches().length === 0"
        (onClick)="openCreate()"
      />
    </div>
  </div>

  @if (channels(); as list) {
    @if (list.length === 0) {
      <div class="empty anim-in">{{ t('channels.empty') }}</div>
    } @else {
      <ag-grid-angular
        class="anim-in"
        [rowData]="list"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="theme"
        [gridOptions]="gridOptions"
        domLayout="autoHeight"
        [suppressPaginationPanel]="true"
        (gridReady)="onGridReady($event)"
        style="width:100%"
      />
    }
  } @else {
    <app-loading variant="table" [rows]="4" />
  }

  <!-- Criar canal -->
  <p-dialog
    [visible]="createDialog()"
    (visibleChange)="createDialog.set($event)"
    [modal]="true"
    [style]="{ width: '440px' }"
    [header]="t('channels.new')"
  >
    <div class="form-grid">
      @if (availableNiches().length === 0) {
        <p class="muted">{{ t('channels.allNichesHaveChannel') }}</p>
      } @else {
        <div class="field">
          <label>{{ t('channels.col.niche') }}</label>
          <p-select [options]="availableNiches()" [(ngModel)]="newNicheId" optionLabel="name" optionValue="id" appendTo="body" fluid />
        </div>
        <div class="field">
          <label>{{ t('channels.col.name') }}</label>
          <input pInputText [(ngModel)]="newName" [placeholder]="t('channels.namePlaceholder')" fluid />
        </div>
      }
    </div>
    <ng-template #footer>
      <p-button [label]="t('common.cancel')" [text]="true" severity="secondary" (onClick)="createDialog.set(false)" />
      <p-button [label]="t('common.save')" icon="pi pi-check" [loading]="saving()" [disabled]="!newNicheId" (onClick)="create()" />
    </ng-template>
  </p-dialog>

  <!-- Conectar Meta -->
  <p-dialog
    [visible]="connectDialog()"
    (visibleChange)="connectDialog.set($event)"
    [modal]="true"
    [style]="{ width: '520px' }"
    [header]="t('channels.connectTitle')"
  >
    <div class="form-grid">
      <p class="muted">{{ t('channels.connectHint') }}</p>
      <div class="field">
        <label>{{ t('channels.col.name') }}</label>
        <input pInputText [(ngModel)]="connName" fluid />
      </div>
      <div class="field-row">
        <div class="field">
          <label>{{ t('channels.pageId') }}</label>
          <input pInputText [(ngModel)]="connPageId" fluid />
        </div>
        <div class="field">
          <label>{{ t('channels.igUserId') }}</label>
          <input pInputText [(ngModel)]="connIgUserId" fluid />
        </div>
      </div>
      <div class="field">
        <label>{{ t('channels.accessToken') }}</label>
        <input pInputText type="password" [(ngModel)]="connAccessToken" autocomplete="off" [placeholder]="t('channels.tokenPlaceholder')" fluid />
      </div>
      <div class="field">
        <label>{{ t('channels.mediaBaseUrl') }}</label>
        <input pInputText [(ngModel)]="connMediaBaseUrl" placeholder="https://app.tomolibrary.com.br" fluid />
      </div>
    </div>
    <ng-template #footer>
      <p-button [label]="t('common.cancel')" [text]="true" severity="secondary" (onClick)="connectDialog.set(false)" />
      <p-button [label]="t('channels.saveConnection')" icon="pi pi-check" [loading]="saving()" (onClick)="saveConnect()" />
    </ng-template>
  </p-dialog>
</ng-container>
