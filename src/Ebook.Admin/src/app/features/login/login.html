<div class="login-page">
  <form class="login-card" (ngSubmit)="submit()">
    <tomo-logo />
    <p class="subtitle">Fábrica autônoma de e-books</p>

    <div class="field">
      <label for="username">Usuário</label>
      <input
        pInputText
        id="username"
        name="username"
        [(ngModel)]="username"
        autocomplete="username"
        fluid
        required
      />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <p-password
        inputId="password"
        name="password"
        [(ngModel)]="password"
        [feedback]="false"
        [toggleMask]="true"
        [fluid]="true"
        autocomplete="current-password"
      />
    </div>

    @if (error(); as message) {
      <p-message severity="error">{{ message }}</p-message>
    }

    <p-button type="submit" [loading]="loading()" label="Entrar" icon="pi pi-sign-in" />
  </form>
</div>
