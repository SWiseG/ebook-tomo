<div class="login-page" *transloco="let t">
  <form class="login-card" (ngSubmit)="submit()">
    <tomo-logo />
    <p class="subtitle">{{ t('login.subtitle') }}</p>

    <div class="field">
      <label for="username">{{ t('login.username') }}</label>
      <input
        pInputText
        id="username"
        name="username"
        [(ngModel)]="username"
        autocomplete="username"
        fluid
        required
      />
    </div>

    <div class="field">
      <label for="password">{{ t('login.password') }}</label>
      <p-password
        inputId="password"
        name="password"
        [(ngModel)]="password"
        [feedback]="false"
        [toggleMask]="true"
        [fluid]="true"
        autocomplete="current-password"
      />
    </div>

    @if (error(); as message) {
      <p-message severity="error">{{ message }}</p-message>
    }

    <p-button type="submit" [loading]="loading()" [label]="t('login.submit')" icon="pi pi-sign-in" />
  </form>
</div>
