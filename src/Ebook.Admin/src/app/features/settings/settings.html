<div class="page-head">
  <div>
    <h1>Configurações</h1>
    <div class="sub">Valores dinâmicos da plataforma (JSON cru). Tetos de IA, descoberta, publicação.</div>
  </div>
</div>

@if (rows(); as list) {
  <div class="list">
    @for (row of list; track row.key) {
      <p-card>
        <div class="setting">
          <div class="field">
            <label>{{ row.key }}</label>
            <textarea pTextarea rows="2" [(ngModel)]="row.value" [name]="row.key" fluid></textarea>
          </div>
          <p-button label="Salvar" icon="pi pi-check" size="small" (onClick)="save(row)" />
        </div>
      </p-card>
    } @empty {
      <div class="empty">Nenhuma configuração gravada ainda.</div>
    }
  </div>

  <p-card>
    <ng-template #title>Nova configuração</ng-template>
    <div class="new-grid">
      <div class="field">
        <label>Chave</label>
        <input pInputText list="known-keys" [(ngModel)]="newKey" name="newKey" placeholder="discovery.topN" fluid />
        <datalist id="known-keys">
          @for (k of knownKeys; track k) {
            <option [value]="k"></option>
          }
        </datalist>
      </div>
      <div class="field">
        <label>Valor (JSON)</label>
        <textarea pTextarea rows="2" [(ngModel)]="newValue" name="newValue" fluid></textarea>
      </div>
    </div>
    <p-button label="Adicionar" icon="pi pi-plus" size="small" severity="secondary" (onClick)="add()" />
  </p-card>
} @else {
  <p class="muted">Carregando…</p>
}
