name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Ebook.slnx
      - name: Build (warnings = errors)
        run: dotnet build Ebook.slnx --no-restore -warnaserror
      - name: Test
        run: dotnet test Ebook.slnx --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Ebook.Admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Ebook.Admin/package-lock.json
      - run: npm ci
      - run: npm run build
